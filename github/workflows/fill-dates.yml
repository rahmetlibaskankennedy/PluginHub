name: Fill plugin dates

on:
  push:
    branches: [main]
    paths:
      - 'plugins.json'

permissions:
  contents: write

jobs:
  fill-dates:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-fill-dates]')"
    steps:
      - name: Repoyu checkout et
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bos dateAdded alanlarini doldur
        run: node scripts/fill-dates.js

      - name: Degisiklik varsa commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- plugins.json; then
            git add plugins.json
            git commit -m "plugins.json: dateAdded alanlarini otomatik doldur [skip-fill-dates]"
            git push
          else
            echo "Degisiklik yok, commit atlaniyor."
          fi
