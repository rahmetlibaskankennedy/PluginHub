<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PluginHub — Streaming Media Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        const REPORT_ENDPOINT = 'https://pluginhub.sait-yldrm.workers.dev';
    </script>

    <style>
        :root {
            --bg-main: #0b0a1f;
            --bg-card: #151333;
            --bg-card-hover: #1c1a42;
            --border: rgba(255, 255, 255, 0.08);
            --accent-pink: #ff2a5f;
            --accent-purple: #6c5ce7;
            --accent-yellow: #ffb800;
            --text-main: #ffffff;
            --text-muted: #8c89b4;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* Streaming Service UI Cam & Gölge Efektleri */
        .stream-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stream-card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            border-color: rgba(108, 92, 231, 0.5);
            box-shadow: 0 15px 35px rgba(108, 92, 231, 0.2);
        }

        /* Featured Medya Hero Kartı */
        .hero-media-box {
            background: linear-gradient(135deg, #1d1a4d 0%, #110e2b 100%);
            border-radius: 24px;
            border: 1px solid rgba(255, 42, 95, 0.2);
            position: relative;
            overflow: hidden;
        }

        .play-btn-circle {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: var(--accent-pink);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 42, 95, 0.6);
            transition: transform 0.2s;
        }
        .play-btn-circle:hover { transform: scale(1.1); }

        /* Mobil Alt Navigasyon Barı */
        .stream-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #141230;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            padding: 8px 24px;
            display: flex; align-items: center; gap: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }
        .dock-btn {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 18px; transition: all 0.2s;
            cursor: pointer;
        }
        .dock-btn.active {
            background: var(--accent-yellow);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.5);
        }

        /* Pill Tab / Etiketler */
        .pill-tab {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .pill-tab.active {
            background: var(--accent-purple);
            color: #fff;
            font-weight: bold;
        }

        /* Modal & Toast */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(5, 4, 15, 0.85);
            backdrop-filter: blur(12px); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #modal-overlay.open { opacity: 1; pointer-events: all; }
        #modal-box {
            background: #151333; border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px; width: 90%; max-width: 560px; padding: 28px;
        }
        #toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent-pink); color: #fff; padding: 10px 24px;
            border-radius: 30px; font-weight: bold; font-size: 13px; z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(255, 42, 95, 0.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- Header -->
<header class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-indigo-600/30 border border-indigo-500/40 flex items-center justify-center font-black text-indigo-400">P</div>
        <span class="text-xl font-extrabold tracking-tight">PluginHub</span>
    </div>
    <div class="flex gap-4 items-center text-xs font-semibold text-slate-400">
        <a href="https://tcl-iffalcon.github.io/wiki/" class="hover:text-white transition">Ana Sayfa</a>
        <a href="https://tcl-iffalcon.github.io/wiki/uygulamalar.html" class="hover:text-white transition hidden md:block">TV APK</a>
        <a href="https://t.me/tcltvturk1" class="hover:text-white transition hidden md:block">Telegram</a>
        <button onclick="toggleFavFilter()" id="favBtn" class="bg-indigo-600/20 text-indigo-300 border border-indigo-500/30 px-4 py-2 rounded-full hover:bg-indigo-600 hover:text-white transition">♡ Favoriler</button>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-4">

    <!-- HERO FEATURED MEDIA -->
    <div class="hero-media-box p-6 md:p-8 mb-8">
        <div class="flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="max-w-xl">
                <span class="text-[10px] font-black uppercase tracking-widest text-pink-500 bg-pink-500/10 border border-pink-500/20 px-3 py-1 rounded-full mb-3 inline-block">Öne Çıkan Eklenti</span>
                <h1 class="text-2xl md:text-4xl font-black text-white mb-2" id="heroTitle">Torrentio + RealDebrid</h1>
                <p class="text-xs md:text-sm text-slate-400 leading-relaxed mb-6" id="heroDesc">Stremio için en hızlı 4K, RealDebrid ve yüksek kaliteli medya kaynak eklentisi entegrasyonu.</p>
                <div class="flex gap-3">
                    <button onclick="openHeroModal()" class="bg-pink-600 hover:bg-pink-500 text-white font-bold text-xs px-6 py-3 rounded-xl shadow-lg shadow-pink-600/30 transition flex items-center gap-2">
                        <span>🚀</span> Hızlı Kurulum
                    </button>
                    <button onclick="copyHeroLink()" class="bg-slate-800 border border-slate-700 text-slate-300 font-bold text-xs px-5 py-3 rounded-xl hover:bg-slate-700 transition">📋 Manifest Kopyala</button>
                </div>
            </div>
            <div class="play-btn-circle cursor-pointer" onclick="openHeroModal()">
                <span class="text-white text-xl">▶</span>
            </div>
        </div>
    </div>

    <!-- KATEGORİ & FİLTRELEME ALANI -->
    <div class="flex gap-2 overflow-x-auto pb-4 mb-6" id="categoryTabs"></div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6 bg-indigo-950/20 p-4 rounded-2xl border border-white/5">
        <select id="appSelect" onchange="filterData()" class="bg-indigo-950/80 border border-slate-800 text-xs text-white p-3 rounded-xl outline-none">
            <option value="all">Tüm Uygulamalar</option>
            <option value="Stremio">Stremio</option>
            <option value="Nuvio">Nuvio</option>
            <option value="Diğer">Diğer</option>
        </select>
        <select id="debridSelect" onchange="filterData()" class="bg-indigo-950/80 border border-slate-800 text-xs text-white p-3 rounded-xl outline-none">
            <option value="all">Tüm Debrid Seçenekleri</option>
            <option value="free">Ücretsiz</option>
            <option value="optional">İsteğe Bağlı</option>
            <option value="required">Debrid Gerekli</option>
        </select>
        <select id="platformSelect" onchange="filterData()" class="bg-indigo-950/80 border border-slate-800 text-xs text-white p-3 rounded-xl outline-none">
            <option value="all">Tüm Cihazlar</option>
            <option value="tv">📺 TV</option>
            <option value="mobile">📱 Mobil</option>
        </select>
        <input type="text" id="searchInput" oninput="filterData()" placeholder="🔍 Eklenti veya içerik ara..." class="bg-indigo-950/80 border border-slate-800 text-xs text-white p-3 rounded-xl outline-none hidden md:block">
    </div>

    <!-- EKLENTİ KARTLARI AKIŞI -->
    <div class="flex justify-between items-center text-xs text-slate-400 mb-4">
        <span id="resultCount"></span>
    </div>

    <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
</main>

<!-- MOBİL DOCK NAVIGATION -->
<div class="stream-dock">
    <button class="dock-btn active" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠</button>
    <button class="dock-btn" onclick="toggleSearchModal()">🔍</button>
    <button class="dock-btn" onclick="toggleFavFilter()">♡</button>
</div>

<!-- GENİŞLETİLMİŞ ARAMA MODALI -->
<div id="search-modal" class="fixed inset-0 bg-[#05040f]/95 backdrop-blur-xl z-[2000] flex flex-col opacity-0 pointer-events-none transition-all duration-300">
    <div class="p-6 md:p-10 flex flex-col gap-4 max-w-3xl mx-auto w-full mt-10 relative">
        <div class="flex justify-between items-center mb-2">
            <span class="text-sm font-bold text-pink-500 uppercase tracking-widest">Keşfet</span>
            <button onclick="toggleSearchModal()" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
        </div>
        <div class="relative">
            <input type="text" id="expandedSearchInput" placeholder="Eklenti, içerik veya platform ara..." class="w-full bg-transparent border-b-2 border-indigo-500/30 text-white text-2xl md:text-4xl py-4 pr-12 outline-none focus:border-pink-500 transition-colors placeholder:text-slate-600 font-black" oninput="handleExpandedSearch(this.value)">
            <span class="absolute right-2 top-1/2 -translate-y-1/2 text-3xl opacity-50">🔍</span>
        </div>
        <p class="text-xs text-slate-500 mt-2">Arama sonuçları arka planda anlık olarak listelenir. Kapatmak için çarpıya veya dışarı tıklayın.</p>
    </div>
</div>

<!-- DETAY MODAL -->
<div id="modal-overlay" onclick="closeModalOnBackdrop(event)">
    <div id="modal-box">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h2 id="modal-title" class="text-xl font-black text-white"></h2>
                <span id="modal-app-tag" class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2.5 py-1 rounded-md font-bold mt-1 inline-block"></span>
            </div>
            <button onclick="closeModal()" class="text-slate-400 text-xl">✕</button>
        </div>
        <p id="modal-desc" class="text-xs text-slate-400 leading-relaxed mb-4"></p>
        <div id="modal-url-box" class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs font-mono text-indigo-300 break-all mb-4"></div>
        <div class="flex gap-2">
            <button id="modal-copy-btn" class="flex-1 bg-pink-600 hover:bg-pink-500 text-white font-bold text-xs py-3 rounded-xl shadow-lg transition">Manifest Kopyala</button>
            <button id="modal-report-btn" onclick="toggleReportBroken()" class="border border-red-500/30 text-red-400 text-xs px-4 rounded-xl">🚩 Bildir</button>
        </div>
    </div>
</div>

<script>
let plugins = [];
let favorites = JSON.parse(localStorage.getItem('ph_favs') || '[]');
let showFavsOnly = false;
let currentModalItem = null;

const HERO_MANIFEST = "https://torrentio.strem.fun/manifest.json";
const HERO_INSTALL_URL = "stremio://torrentio.strem.fun/manifest.json";

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// Hero Butonları Aksiyonları
function openHeroModal() {
    window.location.href = HERO_INSTALL_URL;
    showToast("🚀 Stremio'da Hızlı Kurulum başlatılıyor...");
}

function copyHeroLink() {
    navigator.clipboard.writeText(HERO_MANIFEST);
    showToast("📋 Torrentio Manifest linki kopyalandı!");
}

// Genişletilmiş Arama Modalı Aksiyonları
function toggleSearchModal() {
    const modal = document.getElementById('search-modal');
    const input = document.getElementById('expandedSearchInput');
    
    if(modal.classList.contains('opacity-0')) {
        modal.classList.remove('opacity-0', 'pointer-events-none');
        setTimeout(() => input.focus(), 100); 
    } else {
        modal.classList.add('opacity-0', 'pointer-events-none');
    }
}

function handleExpandedSearch(val) {
    document.getElementById('searchInput').value = val;
    filterData();
}

// Esc tuşu ile geniş arama kapatma
document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') {
        const searchModal = document.getElementById('search-modal');
        if(!searchModal.classList.contains('opacity-0')) {
            toggleSearchModal();
        }
    }
});

function pluginKey(p) { return `${p.app}|${p.name}`; }

function toggleFavFilter() {
    showFavsOnly = !showFavsOnly;
    document.getElementById('favBtn').style.background = showFavsOnly ? 'var(--accent-pink)' : '';
    document.getElementById('favBtn').style.color = showFavsOnly ? '#fff' : '';
    filterData();
}

function renderCards(data) {
    const grid = document.getElementById('resultsGrid');
    const count = document.getElementById('resultCount');
    grid.innerHTML = '';
    count.textContent = `${data.length} Eklenti Listeleniyor`;

    data.forEach(item => {
        const isFav = favorites.includes(pluginKey(item));
        const card = document.createElement('div');
        card.className = 'stream-card p-5 flex flex-col justify-between cursor-pointer';
        card.innerHTML = `
            <div>
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] font-bold uppercase tracking-wider bg-indigo-500/15 text-indigo-400 border border-indigo-500/20 px-2.5 py-1 rounded-lg">${item.app}</span>
                    <button class="text-slate-500 hover:text-pink-500 text-base" onclick="event.stopPropagation(); toggleFav('${pluginKey(item)}')">${isFav ? '❤️' : '♡'}</button>
                </div>
                <h3 class="font-bold text-base text-white mb-1">${item.name}</h3>
                <p class="text-xs text-slate-400 line-clamp-2 leading-relaxed mb-4">${item.desc || ''}</p>
            </div>
            <div class="flex items-center justify-between border-t border-white/5 pt-3 mt-2">
                <span class="text-[11px] text-amber-400 font-bold">⭐ 4.9</span>
                <button onclick="openModal('${pluginKey(item)}')" class="bg-indigo-600/30 hover:bg-indigo-600 text-indigo-300 hover:text-white font-bold text-xs px-4 py-2 rounded-xl transition">Detaylar</button>
            </div>
        `;
        card.onclick = () => openModalItem(item);
        grid.appendChild(card);
    });
}

function toggleFav(key) {
    const idx = favorites.indexOf(key);
    if (idx === -1) favorites.push(key);
    else favorites.splice(idx, 1);
    localStorage.setItem('ph_favs', JSON.stringify(favorites));
    filterData();
}

function filterData() {
    const app = document.getElementById('appSelect').value;
    const debrid = document.getElementById('debridSelect').value;
    const q = document.getElementById('searchInput').value.trim();

    let pool = plugins;
    if (app !== 'all') pool = pool.filter(p => p.app === app);
    if (debrid !== 'all') pool = pool.filter(p => p.debrid === debrid);
    if (showFavsOnly) pool = pool.filter(p => favorites.includes(pluginKey(p)));

    if (q) {
        const fuse = new Fuse(pool, { keys: ['name', 'desc', 'app'], threshold: 0.4 });
        pool = fuse.search(q).map(r => r.item);
    }
    renderCards(pool);
}

function openModalItem(item) {
    currentModalItem = item;
    document.getElementById('modal-title').textContent = item.name;
    document.getElementById('modal-app-tag').textContent = item.app;
    document.getElementById('modal-desc').textContent = item.desc || '';
    
    // Manifest URL Tespiti
    const match = item.desc?.match(/(https?:\/\/[^\s]+)/g);
    const url = match ? match[0] : 'URL Mevcut Değil';
    
    document.getElementById('modal-url-box').textContent = url;
    document.getElementById('modal-copy-btn').onclick = () => {
        navigator.clipboard.writeText(url);
        showToast('📋 Manifest kopyalandı!');
    };
    document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOnBackdrop(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function buildTabs() {
    const types = ['Tümü', 'Stremio', 'Nuvio', 'CloudStream'];
    const container = document.getElementById('categoryTabs');
    container.innerHTML = types.map((t, i) => `<span class="pill-tab ${i===0?'active':''}" onclick="filterTab('${t}', this)">${t}</span>`).join('');
}

function filterTab(type, el) {
    document.querySelectorAll('.pill-tab').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('appSelect').value = type === 'Tümü' ? 'all' : type;
    filterData();
}

// Örnek Dummy Veri Yükleme (Local Test için)
const dummyData = [
    { name: "Torrentio", app: "Stremio", debrid: "optional", desc: "https://torrentio.strem.fun/manifest.json - En iyi kaynak." },
    { name: "SuperFlix", app: "Nuvio", debrid: "free", desc: "https://superflix.com/manifest.json - Ücretsiz filmler." }
];

// Fetch işlemi başarısız olursa dummy veriyi kullan
fetch('plugins.json')
    .then(r => r.json())
    .then(data => {
        plugins = data;
        buildTabs();
        filterData();
    })
    .catch(() => {
        console.error('plugins.json okunamadı, yerel veri kullanılıyor.');
        plugins = dummyData;
        buildTabs();
        filterData();
    });
</script>
</body>
</html>
